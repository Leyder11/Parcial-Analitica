name: AI SDD (SPEC → PR)

on:
  workflow_dispatch:
    inputs:
      requirements_file:
        description: "Archivo de requerimientos a leer (ruta relativa)."
        required: true
        default: "SPEC.md"
      instructions:
        description: "Qué debe implementar la IA (mensaje corto)."
        required: true
        default: "Implementa RF-08: agrega comando edit <id> <nuevo_titulo>, valida no vacío, error si id no existe, y agrega tests en tests/test_todo_cli.py. Mantén pytest -q en verde."
      model:
        description: "(Opcional) Modelo a usar en aider. Ej: gpt-4o-mini o claude-3-haiku-20240307"
        required: false
        default: "gpt-4o-mini"

permissions:
  contents: write
  pull-requests: write

jobs:
  ai_sdd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Prepare prompt
        run: |
          PROMPT_FILE="$RUNNER_TEMP/ai_instructions.md"
          echo "### Instructions" > "$PROMPT_FILE"
          echo "${{ inputs.instructions }}" >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "### Requirements file: ${{ inputs.requirements_file }}" >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "### Requirements content" >> "$PROMPT_FILE"
          cat "${{ inputs.requirements_file }}" >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "Please read the requirements and implement the requested changes." >> "$PROMPT_FILE"
          echo "Then run tests (pytest) and keep them passing." >> "$PROMPT_FILE"

      - name: Preflight (check API keys)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Missing API key. Configure one of: OPENAI_API_KEY or ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Run aider (edits repo)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          echo "aider version:" 
          aider --version || true

          MODEL_INPUT="${{ inputs.model }}"
          MODEL_ARGS=""
          if [ -n "$MODEL_INPUT" ]; then
            MODEL_ARGS="--model $MODEL_INPUT"
            echo "Using model: $MODEL_INPUT"
          fi

          # Aider will pick an available provider based on which key is set.
          # It will edit files in-place.
          # Avoid letting aider create commits in CI; the PR action will commit changes.
          aider $MODEL_ARGS --yes --no-auto-commits --message-file "$RUNNER_TEMP/ai_instructions.md" ${{ inputs.requirements_file }} README.md src/todo_cli/cli.py src/todo_cli/storage.py src/todo_cli/utils.py tests/test_todo_cli.py 2>&1 | tee "$RUNNER_TEMP/aider.log"

      - name: Upload aider log (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aider-log
          path: ${{ runner.temp }}/aider.log

      - name: Show changes (for evidence)
        run: |
          echo "--- git status --porcelain ---"
          git status --porcelain || true
          echo "--- git diff --stat ---"
          git diff --stat || true

      - name: Ensure changes exist (avoid empty PR)
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "::error::No changes were produced, so no PR will be created. Use more specific instructions (e.g., implement RF-08 edit + tests)."
            exit 1
          fi

      - name: Run tests (must pass)
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          pytest -q

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: changes from requirements"
          title: "AI: Changes from requirements"
          body: |
            This PR was generated automatically by the workflow **AI SDD (SPEC → PR)**.
            - Requirements file: `${{ inputs.requirements_file }}`
            - Instructions: `${{ inputs.instructions }}`

            Please review carefully.
          branch: ai/sdd-${{ github.run_id }}
          delete-branch: true

      - name: PR link (summary)
        run: |
          PR_URL="${{ steps.cpr.outputs.pull-request-url }}"
          if [ -n "$PR_URL" ]; then
            echo "Pull Request: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Pull Request was created (no URL returned)." >> "$GITHUB_STEP_SUMMARY"
          fi

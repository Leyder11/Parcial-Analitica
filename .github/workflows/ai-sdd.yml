name: AI SDD (SPEC → PR)

on:
  workflow_dispatch:
    inputs:
      requirements_file:
        description: "Archivo de requerimientos a leer (ruta relativa)."
        required: true
        default: "SPEC.md"
      instructions:
        description: "Qué debe implementar la IA (mensaje corto)."
        required: true
        default: "Revisar SPEC.md y proponer mejoras mínimas manteniendo tests en verde."

permissions:
  contents: write
  pull-requests: write

jobs:
  ai_sdd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Prepare prompt
        run: |
          PROMPT_FILE="$RUNNER_TEMP/ai_instructions.md"
          echo "### Instructions" > "$PROMPT_FILE"
          echo "${{ inputs.instructions }}" >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "### Requirements file: ${{ inputs.requirements_file }}" >> "$PROMPT_FILE"
          echo "" >> "$PROMPT_FILE"
          echo "Please read the requirements and implement the requested changes." >> "$PROMPT_FILE"
          echo "Then run tests (pytest) and keep them passing." >> "$PROMPT_FILE"

      - name: Run aider (edits repo)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Aider will pick an available provider based on which key is set.
          # It will edit files in-place.
          aider --yes --message-file "$RUNNER_TEMP/ai_instructions.md" ${{ inputs.requirements_file }} README.md src/todo_cli/cli.py src/todo_cli/storage.py src/todo_cli/utils.py tests/test_todo_cli.py

      - name: Run tests (must pass)
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          pytest -q

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: changes from requirements"
          title: "AI: Changes from requirements"
          body: |
            This PR was generated automatically by the workflow **AI SDD (SPEC → PR)**.
            - Requirements file: `${{ inputs.requirements_file }}`
            - Instructions: `${{ inputs.instructions }}`

            Please review carefully.
          branch: ai/sdd-${{ github.run_id }}
          delete-branch: true
